name: Feature request
description: Propose an improvement or new capability
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What is missing, painful, or limited today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you want.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Use cases, screenshots, links, related issues, constraints.
